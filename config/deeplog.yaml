# dataset configuration
data_dir: ./dataset/BGL
dataset_name: BGL
#log_file: BGL.log
embeddings: embeddings_tfidf.json

# data preprocessing
grouping: sliding # sliding  #session #sliding  #session
session_level: entry
sequential: true
semantic: false
quantitative: false

# model configuration
model_name: DeepLog
embedding_dim: 300
dropout: 0.1
hidden_size: 128
num_layers: 2
topk: 9

# optimizer configuration
optimizer: adam
adam_beta1: 0.9
adam_beta2: 0.999
max_epoch: 20

# common configuration
output_dir: ./output/
resume: false
#train_size: 0.6 #0.01
#valid_ratio: 0.1
train: true
remove_duplicates: true
